<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1 class="logo"><span class="logo-icon">▶</span>AniVault</h1>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Search...">
            </div>

        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">Sort Navigation</h3>
                <div class="filter-chips">
                    <span class="chip sort-chip" data-sort="scoreDesc">Score: High to Low</span>
                    <span class="chip sort-chip" data-sort="scoreAsc">Score: Low to High</span>
                    <span class="chip sort-chip" data-sort="titleAsc">Title: A-Z</span>
                    <span class="chip sort-chip" data-sort="titleDesc">Title: Z-A</span>
                </div>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">Genres</h3>
                <div class="filter-chips">
                    <span class="chip">Action</span>
                    <span class="chip">Romance</span>
                    <span class="chip">Comedy</span>
                    <span class="chip">Horror</span>
                    <span class="chip">Sci-Fi</span>
                </div>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">Type</h3>
                <div class="filter-chips">
                    <span class="chip">TV</span>
                    <span class="chip">Movie</span>
                </div>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">Status</h3>
                <div class="filter-chips">
                    <span class="chip">Currently Airing</span>
                    <span class="chip">Completed</span>
                    <span class="chip">Upcoming</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div id="loading" class="loading" style="display: block;">Fetching initial animes...</div>
            <div id="anime-grid" class="anime-grid"></div>
            <div id="scroll-trigger" style="text-align: center; padding: 2rem; color: #888; font-weight: 500; font-size: 0.9rem;">Scroll down to load more...</div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
